name: unitwise
description: UnitWise - Smart Electricity Tracking for Nigerian Prepaid Meters
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # State Management
  provider: ^6.1.1
  
  # Firebase
  firebase_core: ^3.6.0
  firebase_auth: ^5.3.1
  cloud_firestore: ^5.4.4
  firebase_storage: ^12.3.2
  
  # HTTP & Network
  http: ^1.1.2
  
  # Location Services
  geolocator: ^10.1.0
  
  # Storage
  flutter_secure_storage: ^9.0.0
  shared_preferences: ^2.2.2
  
  # Environment & Configuration
  flutter_dotenv: ^5.1.0
  
  # UI Components
  pinput: ^3.0.1
  cupertino_icons: ^1.0.2
  fluttertoast: ^8.2.4
  flutter_spinkit: ^5.2.0
  flutter_svg: ^2.0.9

  # Utilities
  uuid: ^4.0.0
  intl: ^0.18.1
  email_validator: ^2.1.17
  dio: ^5.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - .env
