workflows:
  ios-release:
    name: UnitWise iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2
    integrations:
      app_store_connect: App Store Connect API Key
    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.powerviewlabs.unitwise
        provisioning_profile: UnitWise App Store
        certificate: Powerview Labs Distribution
      flutter: stable
    scripts:
      - name: Get Flutter packages
        script: |
          cd frontend
          flutter pub get
      - name: Install CocoaPods
        script: |
          cd frontend/ios
          pod install
      - name: Build iOS IPA
        script: |
          cd frontend
          flutter build ipa --release
    artifacts:
      - frontend/build/ios/ipa/*.ipa
    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
